services:
  - type: web
    name: kidneycare-bd
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/kidneycare.db
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: kidneycare-data
      mountPath: /var/data
      sizeGB: 1
